[tool.poetry]
name = "shared"
version = "0.1.0"
description = "Shared library for Bartender AI Assistant — event schemas, models, NATS client, config"
authors = ["Bartender AI Team"]
readme = "README.md"
packages = [{ include = "shared" }]

[tool.poetry.dependencies]
python = "^3.12"
pydantic = "^2.7"
pydantic-settings = "^2.2"
sqlalchemy = { version = "^2.0", extras = ["asyncio"] }
asyncpg = "^0.29"
alembic = "^1.13"
qdrant-client = "^1.9"
pgvector = "^0.2"
redis = "^5.0"
nats-py = "^2.7"
structlog = "^24.1"
httpx = "^0.27"
python-jose = { version = "^3.3", extras = ["cryptography"] }

[tool.poetry.group.dev.dependencies]
pytest = "^8.2"
pytest-asyncio = "^0.23"
pytest-cov = "^5.0"
httpx = "^0.27"
ruff = "^0.4"
mypy = "^1.10"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "shared.models.*"
disable_error_code = ["attr-defined", "misc", "assignment"]

[[tool.mypy.overrides]]
module = "shared.nats_client.*"
disable_error_code = ["attr-defined"]

[[tool.mypy.overrides]]
module = "pgvector.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short --cov=shared --cov-report=term-missing"
